# Recording Configuration
# LeRobot 데이터셋 레코딩 관련 설정

# =============================================================================
# Dataset Configuration
# =============================================================================
dataset_repo_id: "local/ttttest"  # Hugging Face Hub repository ID (e.g., "username/repo_name") or local path
recording_fps: 30
robot_type: "so101"

# =============================================================================
# Camera Configuration
# =============================================================================
# 공식 LeRobot bi_so_follower 패턴:
#   - shared: 특정 로봇에 귀속되지 않는 공용 카메라 (탑뷰 등)
#             feature name: observation.images.{name}
#   - left_arm / right_arm: 각 로봇에 물리적으로 장착된 카메라
#             feature name: observation.images.left_{name}, observation.images.right_{name}

cameras:
  ## 공용 카메라 (워크스페이스 전체 촬영 — 물체 검출, judge 등에 사용)
  shared:
    - name: "top"
      type: "realsense"
      serial_number: "335622072328"
      enabled: true
      enable_depth: true
      width: 640
      height: 480
      fps: 30

  ## Left arm 카메라 (ROBOT_IDS[0]에 매핑)
  left_arm:
    - name: "wrist"
      type: "opencv"
      enabled: true
      index_or_path: "/dev/video8"
      width: 640
      height: 480
      fps: 30
      fourcc: "MJPG"

  ## Right arm 카메라 (ROBOT_IDS[1]에 매핑)
  right_arm:
    - name: "wrist"
      type: "opencv"
      enabled: true
      index_or_path: "/dev/video6"
      width: 640
      height: 480
      fps: 30
      fourcc: "MJPG"

# =============================================================================
# Skill Features Configuration
# =============================================================================
## skill.* feature 개별 on/off 설정
## false로 설정하면 해당 feature가 dataset에 기록되지 않음
skill_features:
  natural_language: true    # skill.natural_language (자연어 스킬 설명)
  verification_question: true  # skill.verification_question (스킬 성공 확인 질문)
  type: true               # skill.type (move_to, pick, place 등)
  progress: true           # skill.progress (0.0~1.0 진행률)
  goal_position:
    joint: true            # skill.goal_position.joint (목표 joint 위치)
    robot_xyzrpy: true     # skill.goal_position.robot_xyzrpy (robot 좌표계)
    gripper: true          # skill.goal_position.gripper (gripper 상태)

# =============================================================================
# Sub-task Features Configuration (Reset recording용 상위 계층 라벨)
# =============================================================================
## subtask.* feature 개별 on/off 설정
## 여러 skill을 묶는 상위 계층 라벨 (예: "move red block to [0.29, 0.12, 0.01]")
subtask_features:
  natural_language: true      # subtask.natural_language (자연어 서브태스크 설명)
  object_name: true           # subtask.object_name (대상 객체 이름)
  target_position: true       # subtask.target_position (목표 위치 [x, y, z])

# =============================================================================
# Observation Features Configuration
# =============================================================================
## observation.* 추가 feature 개별 on/off 설정
## 활성화 시 매 프레임마다 FK(순운동학)를 계산하여 EE 자세를 기록합니다
## FK 계산 비용은 ~0.1ms로 50Hz 제어 루프에 영향 없음
observation_features:
  ee_pos:
    robot_xyzrpy: true    # observation.ee_pos.robot_xyzrpy (robot base_link 좌표계 EE 자세 [x,y,z,r,p,y])
  gripper_binary: true    # observation.gripper_binary (그리퍼 열림=1.0 / 닫힘=0.0)
  radian:
    state: true            # observation.radian.state (캘리브레이션 중앙 기준 관절 위치, 라디안)
    action: true           # observation.radian.action (캘리브레이션 중앙 기준 목표 관절 위치, 라디안)
    state_urdf0: true      # observation.radian.state_urdf0 (URDF 0° 기준 관절 위치, 라디안)
    action_urdf0: true     # observation.radian.action_urdf0 (URDF 0° 기준 목표 관절 위치, 라디안)

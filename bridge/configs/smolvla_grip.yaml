# SmolVLA Grip adapter - full config

adapter:
  name: "grip"
  loss_weights: [0.3, 0.3, 0.3, 0.3, 0.3, 0.3, 3.0]

model:
  backend: "smolvla"
  name: "lerobot/smolvla_base"
  action_dim: 7
  image_size: 512
  chunk_size: 50
  chunk_stride: 10

lora:
  rank: 64
  alpha: 128
  dropout: 0.1
  target_modules: []

quantization:
  enabled: false

training:
  batch_size: 32
  gradient_accumulation_steps: 1
  learning_rate: 1.0e-5
  weight_decay: 0.0
  warmup_ratio: 0.05
  num_epochs: 19
  scheduler_type: "cosine"
  max_steps: -1
  optimizer: "adamw"
  gradient_checkpointing: false
  bf16: true
  logging_steps: 10
  save_steps: 1000
  max_val_batches: 50
  early_stopping_patience: 10
  dataloader_num_workers: 4

data:
  use_primitive_instructions: true

output:
  base_dir: "outputs"

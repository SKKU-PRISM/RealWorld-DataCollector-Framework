model:
  backend: "pi05"
  name: "lerobot/pi05_base"
  action_dim: 7
  image_size: 224
  chunk_size: 50
  chunk_stride: 10                # 524K -> ~52K chunks (remove 90% overlap)

lora:
  rank: 32
  alpha: 32
  dropout: 0.0
  target_modules: []  # Uses model's _get_default_peft_targets()

quantization:
  enabled: false

training:
  batch_size: 4
  gradient_accumulation_steps: 8  # effective batch=32 (1GPU)
  learning_rate: 5.0e-4
  weight_decay: 0.0
  warmup_ratio: 0.1
  scheduler_type: "cosine"
  max_steps: 2500
  optimizer: "adamw"
  gradient_checkpointing: true
  bf16: true
  logging_steps: 1
  save_steps: 500
  max_val_batches: 50
  early_stopping_patience: 10

data:
  processed_dir: "./data/processed"

output:
  base_dir: "./outputs/vla_adapters"

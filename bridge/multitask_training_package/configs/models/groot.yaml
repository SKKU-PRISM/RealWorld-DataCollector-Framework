model:
  backend: "groot_n1.5"
  name: "nvidia/GR00T-N1.5-3B"
  action_dim: 7
  image_size: 224
  chunk_size: 16  # GROOT action_horizon is 16, not 50
  chunk_stride: 8                 # ~65K chunks (50% overlap)

lora:
  rank: 32
  alpha: 32
  dropout: 0.0

quantization:
  enabled: false

training:
  batch_size: 2
  gradient_accumulation_steps: 16 # effective batch=32 (1GPU)
  learning_rate: 5.0e-4
  weight_decay: 0.0
  warmup_ratio: 0.1
  scheduler_type: "cosine"
  max_steps: 2500
  optimizer: "adamw"
  gradient_checkpointing: false
  bf16: true
  logging_steps: 1
  save_steps: 500
  max_val_batches: 50
  early_stopping_patience: 10

data:
  processed_dir: "./data/processed"

output:
  base_dir: "./outputs/vla_adapters"
